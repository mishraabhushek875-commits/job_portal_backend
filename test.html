<!DOCTYPE html>
<html>
<head>
  <title>WebSocket Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <h2>WebSocket Test</h2>
  
  <div>
    <input type="text" id="userId" placeholder="User ID daalo" />
    <button onclick="joinRoom()">Join Room</button>
  </div>

  <div id="notifications" style="margin-top:20px; padding:10px; border:1px solid #ccc;">
    <h3>Notifications:</h3>
  </div>

  <script>
    const socket = io('http://localhost:5000');

    socket.on('connect', () => {
      document.getElementById('notifications').innerHTML += 
        `<p style="color:green">✅ Server se connected!</p>`;
    });

    function joinRoom() {
      const userId = document.getElementById('userId').value;
      socket.emit('join', userId);
      document.getElementById('notifications').innerHTML += 
        `<p style="color:blue">🏠 Room join kiya: ${userId}</p>`;
    }

    socket.on('notification', (data) => {
      document.getElementById('notifications').innerHTML += 
        `<p style="color:orange">🔔 ${data.message}</p>`;
    });
  </script>
</body>
</html>
